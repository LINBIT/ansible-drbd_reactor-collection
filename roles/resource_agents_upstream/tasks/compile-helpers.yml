---
# Compile C helper binaries from ClusterLabs/resource-agents source

- name: Install gcc
  ansible.builtin.package:
    name: gcc
    state: present

- name: Create heartbeat binary directory
  ansible.builtin.file:
    path: "{{ _ra_bin_dir }}"
    state: directory
    mode: "0755"

- name: Copy C helper sources from the control host cache
  ansible.builtin.copy:
    src: "{{ _ra_control_cache }}/{{ _ra_resolved_version }}/tools/{{ _ra_helper_sources[item] }}"
    dest: "/tmp/{{ _ra_helper_sources[item] }}"
    mode: "0644"
  loop: "{{ _ra_helpers_to_compile }}"

- name: Compile and stamp C helper binaries
  ansible.builtin.shell:
    cmd: |
      set -e
      {% for helper in _ra_helpers_to_compile %}
      gcc -O2 -o {{ _ra_bin_dir }}/{{ helper }} /tmp/{{ _ra_helper_sources[helper] }}
      echo '{{ _ra_resolved_version }}' > {{ _ra_bin_dir }}/.{{ helper }}.version
      rm -f /tmp/{{ _ra_helper_sources[helper] }}
      {% endfor %}
  changed_when: true
