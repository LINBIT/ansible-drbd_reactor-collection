---
# vars file for resource_agents_upstream

# OCF resource agent base path (SUSE uses /usr/lib, others use /lib)
_ra_base_dir: >-
  {{ '/usr/lib/ocf/resource.d/heartbeat'
     if ansible_facts['os_family'] | lower == 'suse'
     else '/lib/ocf/resource.d/heartbeat' }}

_ra_github_repo: ClusterLabs/resource-agents
_ra_github_raw_base: "https://raw.githubusercontent.com/{{ _ra_github_repo }}"
_ra_github_api: "https://api.github.com/repos/{{ _ra_github_repo }}/releases/latest"
_ra_marker: Managed by linbit.drbd_reactor.resource_agents_upstream

_ra_version: >-
  {{ resource_agents_upstream_version
     if resource_agents_upstream_version | length > 0
     else (lookup('ansible.builtin.url', _ra_github_api, split_lines=false)
           | from_json).tag_name }}

# RAs that exist as .in autoconf templates on GitHub (need @BASH_SHELL@ substitution)
_ra_templates:
  - iSCSITarget
  - iSCSILogicalUnit

# OCF shell library installed to {{ _ra_lib_base_dir }}
_ra_lib_base_dir: "{{ _ra_base_dir | dirname | dirname }}/lib/heartbeat"

# Library files that are .in templates on GitHub
_ra_lib_templates:
  - ocf-shellfuncs
  - ocf-binaries
  - ocf-directories

# Library files that are plain (no .in suffix)
_ra_lib_plain:
  - ocf-returncodes
  - ocf-rarun
  - ocf-distro
  - findif.sh
  - nfsserver-redhat.sh

# Autoconf substitutions for OCF library .in templates
_ra_lib_substitutions:
  '@OCF_ROOT_DIR@': /usr/lib/ocf
  '@sbindir@': /usr/sbin
  '@SHELL@': /bin/sh
  '@AWK@': awk
  '@EGREP@': grep -E
  '@IFCONFIG_A_OPT@': -a
  '@MAILCMD@': mailx
  '@PING@': ping
  '@SSH@': /usr/bin/ssh
  '@TEST@': test
  '@prefix@': /usr
  '@exec_prefix@': /usr
  '@datadir@': /usr/share
  '@sysconfdir@': /etc
  '@localstatedir@': /var
  '@libexecdir@': /usr/libexec
  '@INITDIR@': /etc/init.d
  '@HA_RSCTMPDIR@': /run/resource-agents
  '@HA_VARRUNDIR@': /run

# Heartbeat binary directory for C helper utilities (send_arp, tickle_tcp)
_ra_bin_dir: >-
  {{ '/usr/lib64/heartbeat'
     if ansible_facts['os_family'] | lower == 'suse'
     else '/usr/libexec/heartbeat' }}

# Source file names in the tools/ directory of the resource-agents repo
_ra_helper_sources:
  send_arp: send_arp.linux.c
  tickle_tcp: tickle_tcp.c

# C helper binaries to compile, derived from resource_agents_upstream_list
# IPaddr2 needs send_arp for gratuitous ARP on takeover
# portblock needs tickle_tcp for TCP tickling to drop stale sessions
_ra_helpers: >-
  {{
    (['send_arp'] if 'IPaddr2' in resource_agents_upstream_list else [])
    + (['tickle_tcp'] if 'portblock' in resource_agents_upstream_list else [])
  }}
