---
argument_specs:
  main:
    short_description: Install OCF resource agents from GitHub
    description:
      - Download missing OCF resource agents from the ClusterLabs GitHub repository.
      - Only agents not already present on the system are downloaded.
    options:
      resource_agents_upstream_version:
        type: str
        default: ""
        description:
          - Git ref to download, accepting a release tag (for example C(v4.18.0)),
            a branch name (for example C(main)), or a commit SHA.
          - Empty string (default) fetches the latest release from upstream.
          - Branch names are treated as moving refs, so previously installed agents
            are refreshed on every run. Tags and commit SHAs are immutable and skip
            already-current agents.
      resource_agents_upstream_list:
        type: list
        elements: str
        default:
          - portblock
          - Filesystem
          - IPaddr2
          - iSCSITarget
          - iSCSILogicalUnit
          - nfsserver
          - exportfs
          - ganesha-nfs
          - nvmet-subsystem
          - nvmet-namespace
          - nvmet-port
        description:
          - List of OCF resource agent names to ensure are present.
          - Agents not present in the selected version are skipped with a warning instead of failing the role.
          - C helper binaries are compiled automatically based on this list.
          - C(IPaddr2) pulls in C(send_arp) for gratuitous ARP on takeover.
          - C(portblock) pulls in C(tickle_tcp) for TCP tickling to drop stale sessions.
          - RAs without C helper dependencies compile nothing.
