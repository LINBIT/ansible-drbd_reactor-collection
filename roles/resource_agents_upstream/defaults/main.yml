# SPDX-License-Identifier: MIT
---
# defaults file for resource_agents_upstream

# GitHub release tag or branch name - empty string (default) fetches the latest release
resource_agents_upstream_version: ""

# List of OCF resource agents to ensure are present
resource_agents_upstream_list:
  - portblock
  - Filesystem
  - IPaddr2
  - iSCSITarget
  - iSCSILogicalUnit
  - nfsserver
  - exportfs
  - ganesha-nfs
  - nvmet-subsystem
  - nvmet-namespace
  - nvmet-port
