# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Install and configure DRBD Reactor
    description:
      - Install and configure DRBD Reactor.
      - Includes C(linbit.drbd.drbd_install) by default to install DRBD.
    options:
      reactor_install_drbd:
        type: bool
        default: true
        description:
          - Include C(linbit.drbd.drbd_install) to install DRBD.
          - Set to C(false) when DRBD is already managed by a calling role.
      reactor_install_resource_agents_upstream:
        type: bool
        default: true
        description:
          - Include C(linbit.drbd_reactor.resource_agents_upstream) to install missing OCF resource agents from GitHub.
          - Useful on distributions where the C(resource-agents) package is missing or incomplete.
      reactor_install_scst:
        type: bool
        default: false
        description:
          - Include C(linbit.drbd_reactor.scst_install) to compile and install the SCST iSCSI target from source.
          - Pin the SCST git reference with C(scst_install_version) when needed.
