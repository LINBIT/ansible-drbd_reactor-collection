# SPDX-License-Identifier: MIT
---
# Install SCST iSCSI target from source

- name: Check if SCST kernel module is already loaded
  ansible.builtin.stat:
    path: /sys/module/scst
  register: scst_module

- name: Set SCST install flag
  ansible.builtin.set_fact:
    _scst_needs_install: "{{ not scst_module.stat.exists }}"

- name: Select SCST fetch host and overall need
  ansible.builtin.set_fact:
    _scst_any_needed: >-
      {{ ansible_play_hosts | map('extract', hostvars, '_scst_needs_install')
         | select('defined') | map('bool') | select | list | length > 0 }}
    _scst_fetch_host: >-
      {{ ansible_play_hosts | map('extract', hostvars)
         | selectattr('_scst_needs_install', 'defined')
         | selectattr('_scst_needs_install', 'truthy')
         | map(attribute='inventory_hostname') | first
         | default(ansible_play_hosts | first) }}
  run_once: true  # noqa: run-once[task]

- name: Resolve SCST version on the control host
  ansible.builtin.set_fact:
    _scst_resolved_version: >-
      {{ scst_install_version
         if scst_install_version | length > 0
         else (lookup('ansible.builtin.url', scst_install_github_api, split_lines=false)
             | from_json).tag_name }}
  run_once: true  # noqa: run-once[task]
  when: _scst_any_needed | bool

- name: Build SCST with a master branch fallback
  block:
    - name: Build SCST from the resolved version
      ansible.builtin.include_tasks: build.yml
      vars:
        _scst_build_version: "{{ _scst_resolved_version }}"
  rescue:
    - name: Fail when a pinned SCST version does not build
      ansible.builtin.fail:
        msg: >-
          SCST {{ scst_install_version }} failed to build; no fallback for a
          pinned scst_install_version
      when: scst_install_version | length > 0

    - name: Announce the master branch fallback
      ansible.builtin.debug:
        msg: >-
          SCST {{ _scst_resolved_version }} failed to build; retrying from the
          master branch (the master build can also fail)

    - name: Remove the failed build tree
      ansible.builtin.file:
        path: /tmp/scst
        state: absent

    - name: Find stale SCST RPMs from the failed build
      ansible.builtin.find:
        paths: /usr/src/packages/RPMS/x86_64
        patterns: 'scst*.rpm'
      register: _scst_stale_rpms
      when: ansible_facts['os_family'] | lower == 'redhat'

    - name: Remove stale SCST RPMs from the failed build
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ _scst_stale_rpms.files | default([]) }}"
      loop_control:
        label: "{{ item.path }}"
      when: ansible_facts['os_family'] | lower == 'redhat'

    - name: Build SCST from the master branch
      ansible.builtin.include_tasks: build.yml
      vars:
        _scst_build_version: master

# https://github.com/LINBIT/linstor-gateway/issues/24#issuecomment-1800271696
- name: Load SCST kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    persistent: present
    state: present
  loop:
    - scst
    - iscsi-scst
    - scst_vdisk

- name: Create iscsi-scst service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/iscsi-scst.service
    mode: '0644'
    content: |
      [Unit]
      Description=iSCSI SCST Target Daemon
      Documentation=man:iscsi-scstd(8)
      After=network.target
      Before=scst.service
      Conflicts=shutdown.target

      [Service]
      EnvironmentFile=-/etc/sysconfig/scst
      PIDFile=/run/iscsi-scstd.pid
      ExecStartPre=/sbin/modprobe iscsi-scst
      ExecStart=/sbin/iscsi-scstd $ISCSID_OPTIONS

      [Install]
      WantedBy=multi-user.target

- name: Start and enable iscsi-scst service
  ansible.builtin.systemd_service:
    name: iscsi-scst.service
    daemon_reload: true
    state: started
    enabled: true
