---
# tasks file for resource_agents_fetch

- name: Check resource agent version markers
  ansible.builtin.command:
    cmd: "grep -m1 '{{ _ra_marker }}' {{ _ra_base }}/{{ item }}"
  loop: "{{ resource_agents_list }}"
  register: _ra_check
  changed_when: false
  failed_when: false

# rc=0: our file (marker found) — check version
# rc=1: system file (exists, no marker) — leave alone
# rc=2: file not found — needs download
- name: Build list of resource agents to download
  ansible.builtin.set_fact:
    _ra_to_download: >-
      {{ _ra_check.results
         | selectattr('rc', 'equalto', 2)
         | map(attribute='item') | list
         + _ra_check.results
           | selectattr('rc', 'equalto', 0)
           | rejectattr('stdout', 'search', _ra_version)
           | map(attribute='item') | list }}

- name: Fetch missing OCF resource agents from GitHub
  ansible.builtin.include_tasks: fetch-agents.yml
  when: _ra_to_download | length > 0
